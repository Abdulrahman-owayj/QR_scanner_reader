<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QR Reader | قارئ QR</title>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c26;
    --border:rgba(255,255,255,0.08); --accent:#7c6dfa; --accent2:#a78bfa;
    --accent-glow:rgba(124,109,250,0.25); --text:#f0eeff;
    --text-muted:rgba(240,238,255,0.5); --success:#34d399;
    --success-glow:rgba(52,211,153,0.2); --danger:#f87171;
    --radius:20px; --radius-sm:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:'Outfit','IBM Plex Sans Arabic',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
  .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
  .orb1{width:400px;height:400px;background:rgba(124,109,250,0.12);top:-100px;left:-100px}
  .orb2{width:300px;height:300px;background:rgba(52,211,153,0.08);bottom:100px;right:-80px}
  .app{position:relative;z-index:1;width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;padding:0 0 2rem}
  header{padding:2.5rem 1.5rem 1rem;text-align:center}
  .logo-ring{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 0 40px var(--accent-glow);animation:pulse-ring 3s ease-in-out infinite}
  @keyframes pulse-ring{0%,100%{box-shadow:0 0 30px var(--accent-glow)}50%{box-shadow:0 0 60px var(--accent-glow),0 0 100px rgba(124,109,250,0.1)}}
  .logo-ring svg{width:36px;height:36px}
  h1{font-size:1.6rem;font-weight:600;background:linear-gradient(135deg,#fff 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3}
  .subtitle{font-size:0.85rem;color:var(--text-muted);margin-top:0.4rem;font-weight:300}
  .lang-switch{display:flex;gap:0.5rem;justify-content:center;margin-top:1.25rem}
  .lang-btn{padding:0.35rem 1.1rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.8rem;cursor:pointer;transition:all 0.2s;font-family:inherit}
  .lang-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:500}

  /* TABS */
  .tabs{display:flex;gap:0;margin:1rem 1.25rem 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;gap:4px}
  .tab-btn{flex:1;padding:0.65rem;border-radius:8px;border:none;background:transparent;color:var(--text-muted);font-size:0.88rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:0.45rem}
  .tab-btn svg{width:15px;height:15px;flex-shrink:0}
  .tab-btn.active{background:var(--accent);color:white;box-shadow:0 2px 12px var(--accent-glow)}
  .tab-panel{display:none}
  .tab-panel.active{display:flex;flex-direction:column}

  /* VOICE PANEL */
  .voice-panel{margin:0.75rem 1.25rem 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;display:flex;flex-direction:column;gap:0.75rem}
  .voice-row{display:flex;align-items:center;gap:0.85rem}
  .mic-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(52,211,153,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.25s;font-family:inherit;background:var(--surface2)}
  .mic-btn:active{transform:scale(0.95)}
  .mic-btn.listening{background:rgba(52,211,153,0.15);border-color:var(--success);animation:mic-pulse 1.2s ease-in-out infinite}
  .mic-btn.denied{border-color:var(--danger);background:rgba(248,113,113,0.1)}
  @keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,0.4)}50%{box-shadow:0 0 0 14px rgba(52,211,153,0)}}
  .mic-btn svg{width:24px;height:24px}
  .voice-info{flex:1}
  .voice-status{font-size:0.82rem;font-weight:500;color:var(--text-muted);transition:color 0.2s}
  .voice-status.on{color:var(--success)}
  .voice-status.err{color:var(--danger)}
  .voice-heard{font-size:0.78rem;color:var(--text-muted);margin-top:0.25rem;font-style:italic;min-height:1.1em}
  .cmd-chips{display:flex;flex-wrap:wrap;gap:0.4rem}
  .chip{font-size:0.72rem;padding:0.2rem 0.65rem;border-radius:100px;border:1px solid var(--border);color:var(--text-muted)}
  .chip.e{border-color:rgba(124,109,250,0.4);color:var(--accent2)}
  .chip.a{border-color:rgba(52,211,153,0.4);color:var(--success)}

  .main{padding:0 1.25rem;flex:1;display:flex;flex-direction:column;gap:1rem;margin-top:1rem}
  .scanner-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .scanner-wrap{position:relative;width:100%;aspect-ratio:1;background:#000;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover;display:block}
  #canvas{display:none}
  .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .scan-frame{width:65%;aspect-ratio:1;position:relative}
  .scan-frame::before,.scan-frame::after,.scan-frame>span::before,.scan-frame>span::after{content:'';position:absolute;width:28px;height:28px;border-color:var(--accent2);border-style:solid}
  .scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:6px 0 0 0}
  .scan-frame::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 6px 0 0}
  .scan-frame>span::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 6px}
  .scan-frame>span::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 6px 0}
  .scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 2.5s ease-in-out infinite;top:10%;border-radius:2px;box-shadow:0 0 10px var(--accent)}
  @keyframes scan{0%{top:10%;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:85%;opacity:0}}
  .cam-off-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;background:var(--surface);color:var(--text-muted);font-size:0.9rem;text-align:center;padding:2rem}
  .cam-off-msg svg{opacity:0.3}
  .scanner-actions{display:flex;gap:0.75rem;padding:1rem}
  .btn{flex:1;padding:0.85rem;border-radius:var(--radius-sm);border:none;font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:0.5rem}
  .btn-primary{background:var(--accent);color:white;box-shadow:0 4px 20px var(--accent-glow)}
  .btn-primary:active{transform:scale(0.97)}
  .btn-primary:hover{background:var(--accent2)}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:active{transform:scale(0.97)}
  .btn svg{width:18px;height:18px}

  /* HISTORY TAB */
  .history-tab-content{padding:0 1.25rem;margin-top:1rem;display:flex;flex-direction:column;gap:1rem}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none}
  .result-card.show{display:block;animation:slide-up 0.4s ease}
  @keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .result-header{display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
  .result-icon{width:36px;height:36px;border-radius:50%;background:var(--success-glow);border:1px solid rgba(52,211,153,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .result-label{font-size:0.75rem;color:var(--success);font-weight:500;text-transform:uppercase;letter-spacing:0.08em}
  .result-body{padding:1.25rem}
  #result-text{font-size:1rem;line-height:1.75;color:var(--text);word-break:break-word;white-space:pre-wrap;min-height:60px}
  .result-actions{display:flex;gap:0.75rem;padding:0 1.25rem 1.25rem}
  .tts-btn{flex:1;padding:0.9rem;border-radius:var(--radius-sm);border:none;font-size:1rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:0.6rem}
  .tts-speak{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;box-shadow:0 4px 25px var(--accent-glow)}
  .tts-speak:active{transform:scale(0.97)}
  .tts-speak.speaking{background:linear-gradient(135deg,#f87171,#fb923c);box-shadow:0 4px 25px rgba(248,113,113,0.3);animation:btn-pulse 1s ease-in-out infinite}
  @keyframes btn-pulse{0%,100%{box-shadow:0 4px 20px rgba(248,113,113,0.3)}50%{box-shadow:0 4px 40px rgba(248,113,113,0.5)}}
  .wave-bars{display:none;align-items:center;gap:3px;height:20px}
  .wave-bars.active{display:flex}
  .wave-bars span{display:block;width:3px;background:white;border-radius:2px;animation:wave 1s ease-in-out infinite}
  .wave-bars span:nth-child(1){animation-delay:0s;height:8px}
  .wave-bars span:nth-child(2){animation-delay:0.15s;height:16px}
  .wave-bars span:nth-child(3){animation-delay:0.3s;height:10px}
  .wave-bars span:nth-child(4){animation-delay:0.15s;height:18px}
  .wave-bars span:nth-child(5){animation-delay:0s;height:8px}
  @keyframes wave{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1)}}
  .history-section{display:flex;flex-direction:column;gap:0.5rem}
  .section-label{font-size:0.75rem;color:var(--text-muted);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:0 0.25rem;margin-bottom:0.6rem}
  .history-list{display:flex;flex-direction:column;gap:0.5rem}
  .history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.85rem 1rem;cursor:pointer;display:flex;align-items:center;gap:0.75rem;transition:all 0.2s}
  .history-item:hover{border-color:rgba(255,255,255,0.15);background:var(--surface2)}
  .history-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .history-text{font-size:0.85rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .history-play{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .history-empty{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:0.88rem;display:flex;flex-direction:column;align-items:center;gap:0.75rem}
  .history-empty svg{opacity:0.2}
  .history-badge{background:var(--accent);color:white;font-size:0.65rem;font-weight:600;border-radius:100px;padding:0.1rem 0.45rem;min-width:18px;text-align:center;display:none}
  .history-badge.show{display:inline-block}
  .status-bar{padding:0.6rem 1.25rem;font-size:0.78rem;color:var(--text-muted);text-align:center;display:none}
  .status-bar.show{display:block}
  .status-bar.error{color:var(--danger)}
  .status-bar.success{color:var(--success)}
  #file-input{display:none}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important}}
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="app">
  <header>
    <div class="logo-ring">
      <svg viewBox="0 0 36 36" fill="none">
        <rect x="4" y="4" width="10" height="10" rx="2" stroke="white" stroke-width="2"/>
        <rect x="22" y="4" width="10" height="10" rx="2" stroke="white" stroke-width="2"/>
        <rect x="4" y="22" width="10" height="10" rx="2" stroke="white" stroke-width="2"/>
        <rect x="7" y="7" width="4" height="4" fill="white" rx="1"/>
        <rect x="25" y="7" width="4" height="4" fill="white" rx="1"/>
        <rect x="7" y="25" width="4" height="4" fill="white" rx="1"/>
        <path d="M22 22h4v4h-4zM28 22h4v4h-4zM22 28h4v4h-4zM28 28h4v4h-4z" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <h1 id="title-text">QR Voice Reader</h1>
    <p class="subtitle" id="subtitle-text">Scan any QR code and hear it spoken aloud</p>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('en')">English</button>
      <button class="lang-btn" onclick="setLang('ar')">العربية</button>
      <button class="lang-btn" onclick="setLang('auto')">Auto</button>
    </div>
  </header>

  <!-- VOICE COMMAND PANEL -->
  <div class="voice-panel">
    <div class="voice-row">
      <button class="mic-btn" id="mic-btn" onclick="toggleVoice()" aria-label="Toggle voice commands">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
      <div class="voice-info">
        <div class="voice-status" id="vs">Tap mic to activate voice commands</div>
        <div class="voice-heard" id="vh"></div>
      </div>
    </div>
    <div class="cmd-chips">
      <span class="chip e">"scan"</span>
      <span class="chip e">"stop"</span>
      <span class="chip e">"read"</span>
      <span class="chip e">"repeat"</span>
      <span class="chip e">"silence"</span>
      <span class="chip a">"امسح"</span>
      <span class="chip a">"إيقاف"</span>
      <span class="chip a">"اقرأ"</span>
      <span class="chip a">"كرر"</span>
      <span class="chip a">"اسكت"</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-scanner" onclick="switchTab('scanner')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <path d="M14 14h2v2h-2zM18 14h3v2h-3zM14 18h2v3h-2zM18 18h3v3h-3z"/>
      </svg>
      <span id="tab-scanner-text">Scanner</span>
    </button>
    <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span id="tab-history-text">History</span>
      <span class="history-badge" id="history-badge">0</span>
    </button>
  </div>

  <!-- SCANNER TAB -->
  <div class="tab-panel active" id="panel-scanner">
    <div class="main">
      <div class="scanner-card">
        <div class="scanner-wrap">
          <video id="video" playsinline autoplay muted></video>
          <canvas id="canvas"></canvas>
          <div class="scan-overlay">
            <div class="scan-frame"><span></span><div class="scan-line"></div></div>
          </div>
          <div class="cam-off-msg" id="cam-off">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
            </svg>
            <span id="cam-off-text">Say "scan" or tap Start Camera</span>
          </div>
        </div>
        <div class="scanner-actions">
          <button class="btn btn-primary" id="cam-btn" onclick="toggleCamera()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
            </svg>
            <span id="cam-btn-text">Start Camera</span>
          </button>
          <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span id="upload-btn-text">Upload Image</span>
          </button>
          <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">
        </div>
      </div>
      <div class="status-bar" id="status-bar"></div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div class="tab-panel" id="panel-history">
    <div class="history-tab-content">
      <div class="result-card" id="result-card">
        <div class="result-header">
          <div class="result-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div><div class="result-label" id="result-label">QR Code Detected</div></div>
        </div>
        <div class="result-body"><div id="result-text"></div></div>
        <div class="result-actions">
          <button class="tts-btn tts-speak" id="speak-btn" onclick="toggleSpeak()">
            <div class="wave-bars" id="wave-bars">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <svg id="speak-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 010 7.07"/>
              <path d="M19.07 4.93a10 10 0 010 14.14"/>
            </svg>
            <span id="speak-btn-text">Speak</span>
          </button>
        </div>
      </div>

      <div class="history-section" id="history-section">
        <div class="section-label" id="history-label">Recent Scans</div>
        <div class="history-list" id="history-list"></div>
        <div class="history-empty" id="history-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="history-empty-text">No scans yet. Start scanning to see history here.</span>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ── state ── */
let stream=null, scanning=false, currentLang='en', currentText='', isSpeaking=false, history=[];
let recog=null, voiceOn=false, keepOn=false;
let activeTab='scanner';

const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

/* ── strings ── */
const S={
  en:{title:'QR Voice Reader',subtitle:'Scan any QR code and hear it spoken aloud',
      startCam:'Start Camera',stopCam:'Stop Camera',upload:'Upload Image',
      camOff:'Say "scan" or tap Start Camera',scanning:'Scanning for QR code…',
      detected:'QR Code Detected',speak:'Speak',stop:'Stop',history:'Recent Scans',
      noQR:'No QR code found in image',camErr:'Camera access denied.',noSup:'TTS not supported.',
      micReady:'Tap mic to activate voice commands',micOn:'Listening for commands…',
      micOff:'Voice commands off',micDenied:'Microphone permission denied',
      heard:'Heard: ',tabScanner:'Scanner',tabHistory:'History',
      historyEmpty:'No scans yet. Start scanning to see history here.'},
  ar:{title:'قارئ QR الصوتي',subtitle:'امسح أي رمز QR واستمع إليه بصوت عالٍ',
      startCam:'تشغيل الكاميرا',stopCam:'إيقاف الكاميرا',upload:'رفع صورة',
      camOff:'قل "امسح" أو اضغط تشغيل الكاميرا',scanning:'جارٍ البحث عن رمز QR…',
      detected:'تم الكشف عن رمز QR',speak:'نطق',stop:'إيقاف',history:'عمليات المسح الأخيرة',
      noQR:'لم يتم العثور على رمز QR',camErr:'تم رفض الوصول إلى الكاميرا.',noSup:'النطق غير مدعوم.',
      micReady:'اضغط الميكروفون لتفعيل الأوامر الصوتية',micOn:'جارٍ الاستماع للأوامر…',
      micOff:'الأوامر الصوتية متوقفة',micDenied:'تم رفض إذن الميكروفون',
      heard:'سمعت: ',tabScanner:'الماسح',tabHistory:'السجل',
      historyEmpty:'لا توجد عمليات مسح بعد. ابدأ المسح لرؤية السجل هنا.'}
};
const t=k=>(S[currentLang==='auto'?'en':currentLang]||S.en)[k]||S.en[k]||k;

/* ── tab switching ── */
function switchTab(tab){
  activeTab=tab;
  document.getElementById('tab-scanner').classList.toggle('active',tab==='scanner');
  document.getElementById('tab-history').classList.toggle('active',tab==='history');
  document.getElementById('panel-scanner').classList.toggle('active',tab==='scanner');
  document.getElementById('panel-history').classList.toggle('active',tab==='history');
}

/* ── i18n update ── */
function setLang(lang){
  currentLang=lang;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',['en','ar','auto'][i]===lang));
  const l=lang==='auto'?'en':lang, s=S[l];
  document.getElementById('title-text').textContent=s.title;
  document.getElementById('subtitle-text').textContent=s.subtitle;
  document.getElementById('cam-btn-text').textContent=scanning?s.stopCam:s.startCam;
  document.getElementById('upload-btn-text').textContent=s.upload;
  document.getElementById('cam-off-text').textContent=s.camOff;
  document.getElementById('result-label').textContent=s.detected;
  document.getElementById('speak-btn-text').textContent=isSpeaking?s.stop:s.speak;
  document.getElementById('history-label').textContent=s.history;
  document.getElementById('vs').textContent=voiceOn?s.micOn:s.micReady;
  document.getElementById('tab-scanner-text').textContent=s.tabScanner;
  document.getElementById('tab-history-text').textContent=s.tabHistory;
  document.getElementById('history-empty-text').textContent=s.historyEmpty;
  document.documentElement.lang=l;
  document.documentElement.dir=lang==='ar'?'rtl':(lang==='auto'?'auto':'ltr');
  if(recog) recog.lang=lang==='ar'?'ar-SA':(lang==='auto'?'ar-SA':'en-US');
}

/* ── voice command map ── */
const CMD={
  scan:['scan','start','open','camera','start scanning','open camera','امسح','ابدأ','افتح','تشغيل','مسح','ابدأ المسح'],
  stop:['stop','close','stop camera','cancel','إيقاف','أوقف','أغلق','إغلاق','اغلق'],
  read:['read','speak','say','play','اقرأ','قراءة','قل','انطق','اقرأ لي'],
  repeat:['repeat','again','once more','say again','كرر','مرة أخرى','أعد','كررها'],
  silence:['silence','quiet','shut up','stop speaking','اسكت','صمت','توقف عن الكلام']
};

function matchCmd(txt){
  const low=txt.toLowerCase().trim();
  for(const[action,kws]of Object.entries(CMD))
    for(const kw of kws) if(low.includes(kw)) return action;
  return null;
}

function execCmd(action){
  switch(action){
    case'scan':    !scanning?startCamera():feedback('Camera already scanning'); break;
    case'stop':    scanning?stopCamera():feedback('Camera is off'); break;
    case'read':    currentText?speakText(currentText):feedback('No QR scanned yet'); break;
    case'repeat':  if(currentText){window.speechSynthesis.cancel();setTimeout(()=>speakText(currentText),200);}else feedback('Nothing to repeat'); break;
    case'silence': window.speechSynthesis.cancel();setSpeaking(false); break;
  }
}

function feedback(msg){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(msg);
  u.lang='en-US';u.rate=1;
  window.speechSynthesis.speak(u);
}

/* ── recognition setup ── */
function buildRecog(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.continuous=true; r.interimResults=false; r.maxAlternatives=3;
  r.lang=currentLang==='ar'?'ar-SA':(currentLang==='auto'?'ar-SA':'en-US');
  r.onresult=e=>{
    let heard='';
    for(let i=e.resultIndex;i<e.results.length;i++)
      if(e.results[i].isFinal){heard=e.results[i][0].transcript;break;}
    if(!heard)return;
    document.getElementById('vh').textContent=t('heard')+'"'+heard+'"';
    const action=matchCmd(heard);
    if(action){execCmd(action);document.getElementById('vh').textContent='✓ '+heard;}
  };
  r.onstart=()=>{voiceOn=true;setMicUI(true);};
  r.onend=()=>{
    if(keepOn){try{r.start();}catch(e){}}
    else{voiceOn=false;setMicUI(false);}
  };
  r.onerror=e=>{
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      keepOn=false;voiceOn=false;
      document.getElementById('vs').textContent=t('micDenied');
      document.getElementById('vs').className='voice-status err';
      document.getElementById('mic-btn').classList.add('denied');
    }
  };
  return r;
}

function toggleVoice(){
  if(!recog){
    recog=buildRecog();
    if(!recog){document.getElementById('vs').textContent='Voice commands not supported';return;}
  }
  if(voiceOn){
    keepOn=false;recog.stop();voiceOn=false;setMicUI(false);
  } else {
    keepOn=true;try{recog.start();}catch(e){}
  }
}

function setMicUI(on){
  const btn=document.getElementById('mic-btn'),st=document.getElementById('vs');
  btn.classList.toggle('listening',on);
  st.className='voice-status'+(on?' on':'');
  st.textContent=on?t('micOn'):t('micReady');
  if(!on)document.getElementById('vh').textContent='';
}

document.addEventListener('click',function once(){
  if(!recog){recog=buildRecog();}
  if(recog&&!voiceOn){keepOn=true;try{recog.start();}catch(e){}}
  document.removeEventListener('click',once);
},{once:true});

/* ── camera ── */
async function toggleCamera(){scanning?stopCamera():await startCamera();}

async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:1280}}});
    video.srcObject=stream;
    document.getElementById('cam-off').style.display='none';
    scanning=true;
    document.getElementById('cam-btn-text').textContent=t('stopCam');
    showStatus(t('scanning'),'');
    requestAnimationFrame(tick);
  }catch(e){showStatus(t('camErr'),'error');}
}

function stopCamera(){
  if(stream){stream.getTracks().forEach(tr=>tr.stop());stream=null;}
  video.srcObject=null;
  document.getElementById('cam-off').style.display='flex';
  scanning=false;
  document.getElementById('cam-btn-text').textContent=t('startCam');
  hideStatus();
}

function tick(){
  if(!scanning)return;
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
    if(code&&code.data&&code.data!==currentText)onQRFound(code.data);
  }
  requestAnimationFrame(tick);
}

function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);
      const data=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=jsQR(data.data,data.width,data.height);
      code?onQRFound(code.data):showStatus(t('noQR'),'error');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);e.target.value='';
}

function onQRFound(text){
  currentText=text;
  document.getElementById('result-text').textContent=text;
  document.getElementById('result-card').classList.add('show');
  showStatus(t('detected'),'success');
  history.unshift(text);if(history.length>5)history.pop();
  renderHistory();
  updateBadge();
  /* auto-switch to history tab to show result */
  switchTab('history');
  setTimeout(()=>speakText(text),300);
}

/* ── TTS ── */
function detectLang(text){
  if(currentLang!=='auto')return currentLang;
  const ar=(text.match(/[\u0600-\u06FF]/g)||[]).length;
  return ar>text.length*0.2?'ar':'en';
}

function speakText(text){
  if(!window.speechSynthesis){showStatus(t('noSup'),'error');return;}
  window.speechSynthesis.cancel();
  const utter=new SpeechSynthesisUtterance(text);
  const lang=detectLang(text);
  utter.lang=lang==='ar'?'ar-SA':'en-US';
  utter.rate=lang==='ar'?0.85:0.95;utter.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const match=voices.find(v=>v.lang.startsWith(lang==='ar'?'ar':'en')&&v.localService);
  if(match)utter.voice=match;
  utter.onstart=()=>setSpeaking(true);
  utter.onend=utter.onerror=()=>setSpeaking(false);
  window.speechSynthesis.speak(utter);
}

function toggleSpeak(){
  isSpeaking?(window.speechSynthesis.cancel(),setSpeaking(false)):currentText&&speakText(currentText);
}

function setSpeaking(val){
  isSpeaking=val;
  document.getElementById('speak-btn').classList.toggle('speaking',val);
  document.getElementById('speak-icon').style.display=val?'none':'block';
  document.getElementById('wave-bars').classList.toggle('active',val);
  document.getElementById('speak-btn-text').textContent=val?t('stop'):t('speak');
}

/* ── history ── */
function updateBadge(){
  const badge=document.getElementById('history-badge');
  badge.textContent=history.length;
  badge.classList.toggle('show', history.length>0);
}

function renderHistory(){
  const list=document.getElementById('history-list');
  const empty=document.getElementById('history-empty');
  if(!history.length){
    list.innerHTML='';
    empty.style.display='flex';
    return;
  }
  empty.style.display='none';
  list.innerHTML=history.map((item,i)=>`
    <div class="history-item" onclick="replayScan(${i})">
      <div class="history-dot"></div>
      <div class="history-text">${item.substring(0,80)}${item.length>80?'…':''}</div>
      <div class="history-play">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
      </div>
    </div>`).join('');
}

function replayScan(i){
  currentText=history[i];
  document.getElementById('result-text').textContent=currentText;
  document.getElementById('result-card').classList.add('show');
  speakText(currentText);
}

/* ── status ── */
function showStatus(msg,type){const b=document.getElementById('status-bar');b.textContent=msg;b.className='status-bar show'+(type?' '+type:'');}
function hideStatus(){document.getElementById('status-bar').className='status-bar';}

if(window.speechSynthesis)window.speechSynthesis.getVoices();
</script>
